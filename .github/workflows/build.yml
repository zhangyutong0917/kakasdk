name: Build KakaHookEngine

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: 修复 Homebrew 报错
        run: |
          export HOMEBREW_NO_AUTO_UPDATE=1
          brew --version || true

      - name: 配置 Xcode 命令行工具
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
          xcode-select -p
          which make

      - name: 手动安装 Theos
        run: |
          export THEOS=/opt/theos
          if [ ! -d "$THEOS" ]; then
            sudo mkdir -p $THEOS
            sudo chmod 777 $THEOS
            git clone --recursive https://github.com/theos/theos.git $THEOS
          fi
          brew install ldid || true
          echo "THEOS=$THEOS" >> $GITHUB_ENV

      - name: 下载 iOS SDK
        run: |
          sudo mkdir -p /opt/theos/sdks
          sudo chmod 777 /opt/theos/sdks
          cd /opt/theos/sdks
          if [ ! -d "iPhoneOS18.0.sdk" ]; then
            echo "Cloning SDKs repo..."
            git clone --depth 1 https://github.com/theos/sdks.git _sdks_tmp
            echo "--- Repo contents ---"
            ls -la _sdks_tmp/
            echo "--- Searching for SDK ---"
            find _sdks_tmp -name "iPhoneOS18.0.sdk" -type d
            find _sdks_tmp -name "iPhoneOS18.0.sdk" -type d -exec cp -r {} /opt/theos/sdks/ \;
            echo "--- After copy ---"
            ls -la /opt/theos/sdks/
            rm -rf _sdks_tmp
          fi
          ls -la /opt/theos/sdks/

      - name: 编译 dylib
        run: |
          export THEOS=/opt/theos
          export SDKROOT=/opt/theos/sdks/iPhoneOS18.0.sdk
          make clean
          make
          ls -la .theos/obj/debug/

      - name: 校验编译文件
        run: |
          file .theos/obj/debug/KakaHookEngine.dylib
          ls -lh .theos/obj/debug/KakaHookEngine.dylib

      - name: 上传编译成品
        uses: actions/upload-artifact@v4
        with:
          name: KakaHookEngine_iOS16_26_dylib
          path: .theos/obj/debug/KakaHookEngine.dylib
